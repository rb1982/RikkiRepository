name: AI Reviewer
on:
  workflow_dispatch: 
    inputs:
      pr_number:
        description: "Pull Request Number"
        required: true
jobs:
  ai_review:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Show PR number
        run: echo "Reviewing PR # ${{github.event.inputs.pr_number}}"
    
