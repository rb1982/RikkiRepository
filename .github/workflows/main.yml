name: AI Reviewer

permissions:
  checks: write

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull Request Number"
        required: true
        type: string

jobs:
  ai_review:
    name: AI PR Review
    runs-on: ubuntu-latest

    steps:

      - name: Fetch PR Details
        run: |
          response=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ inputs.pr_number }})

          prNumber=$(echo "$response" | jq -r '.number')
          title=$(echo "$response" | jq -r '.title')
          state=$(echo "$response" | jq -r '.state')
          headBranch=$(echo "$response" | jq -r '.head.ref')
          headSha=$(echo "$response" | jq -r '.head.sha')

          echo "PR Number: $prNumber"
          echo "Title: $title"
          echo "State: $state"
          echo "Head Branch: $headBranch"
          echo "Head SHA: $headSha"

          echo "HEAD_BRANCH=$headBranch" >> $GITHUB_ENV
          echo "HEAD_SHA=$headSha" >> $GITHUB_ENV

      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_BRANCH }}

      - name: Fetch Changed Files
        run: |
          files=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ inputs.pr_number }}/files)

          echo "$files" | jq -r '.[].filename' > changed_files.txt

          echo "Changed Files:"
          cat changed_files.txt

      - name: Build Review Payload
        run: |
          > review_input.txt

          while read file
          do
            if [ -f "$file" ]; then

              echo "" >> review_input.txt
              echo "====================================" >> review_input.txt
              echo "FILE: $file" >> review_input.txt
              echo "====================================" >> review_input.txt

              cat "$file" >> review_input.txt

            else
              echo "WARNING: File not found -> $file"
            fi

          done < changed_files.txt

          echo "Review payload created"

      - name: Call Groq
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |

          PROMPT=$(cat review_input.txt)

          jq -n \
            --arg prompt "$PROMPT" \
            '{
              model: "llama-3.3-70b-versatile",
              messages: [
                {
                  role: "system",
                  content: "You are a senior Java code reviewer. Review the supplied code and identify bugs, null pointer risks, security issues, maintainability concerns and code smells. Return findings grouped into HIGH, MEDIUM and LOW severity."
                },
                {
                  role: "user",
                  content: $prompt
                }
              ]
            }' > request.json

          curl -s \
            https://api.groq.com/openai/v1/chat/completions \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "Content-Type: application/json" \
            -d @request.json \
            > response.json

          cat response.json | jq -r '.choices[0].message.content' > review_output.txt

          echo "================ AI REVIEW ================"
          cat review_output.txt
          echo "==========================================="

      - name: Publish GitHub Check
        run: |

          REVIEW=$(cat review_output.txt)

          jq -n \
            --arg review "$REVIEW" \
            --arg sha "$HEAD_SHA" \
            '{
              name: "AI Review",
              head_sha: $sha,
              status: "completed",
              conclusion: "success",
              output: {
                title: "AI Code Review",
                summary: "Automated AI review completed",
                text: $review
              }
            }' > check.json

          curl -s \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/check-runs \
            -d @check.json
