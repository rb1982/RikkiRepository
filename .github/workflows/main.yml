name: AI Reviewer
on:
  workflow_dispatch: 
    inputs:
      pr_number:
        description: "Pull Request Number"
        required: true
jobs:
  ai_review:
    name: AI PR Review
    runs-on: ubuntu-latest
    steps:
      - name: Get PR Details
        run: |
          echo "Fetching PR#${{inputs.pr_number}}"
          response=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ inputs.pr_number }})
          echo "PR Number: $(echo "$response" | jq -r '.number')"
          echo "Title: $(echo "$response" | jq -r '.title')"
          echo "State: $(echo "$response" | jq -r '.state')"
